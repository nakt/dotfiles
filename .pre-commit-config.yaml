repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
    - id: mixed-line-ending
    - id: check-yaml
    - id: check-json
    - id: check-added-large-files
- repo: local
  hooks:
    - id: export-codex-config
      name: export codex shared config if needed
      entry: make -C .codex export-config
      language: system
      pass_filenames: false
      always_run: true
